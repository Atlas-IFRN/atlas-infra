events {
    worker_connections 1024;
}

http {

    # ── Rate limiting ────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

    # ── Upstreams ────────────────────────────────────────────────
    # Todos os serviços Django escutam internamente na porta 8000.
    # São distinguidos pelo NOME do container na rede docker, não pela porta.
    upstream auth_service        { server auth-service:8000; }
    upstream tracks_service      { server tracks-service:8000; }
    upstream scholarship_service { server scholarship-service:8000; }
    upstream ai_service          { server ai-service:8003; }
    upstream frontend            { server frontend:80; }

    server {
        listen 80;
        server_name _;

        # ==========================================================
        # AUTENTICAÇÃO
        # ----------------------------------------------------------
        # A validação de token é feita VIA gRPC DENTRO de cada serviço
        # (auth-service:50051 → GetUserProfile / validação). O Nginx
        # apenas roteia e repassa o header Authorization adiante.
        #
        # Caso futuramente se queira mover a barreira para a borda
        # (rejeitar requests sem token antes de chegar no serviço),
        # basta DESCOMENTAR o bloco abaixo + as três linhas marcadas
        # com [auth_request] em cada location protegida.
        # ==========================================================
        location = /_auth_validate {
            internal;
            proxy_pass              http://auth_service/api/auth/internal/validate/;
            proxy_pass_request_body off;
            proxy_set_header        Content-Length "";
            proxy_set_header        X-Original-URI $request_uri;
            proxy_set_header        Authorization $http_authorization;
        }

        # ── Auth (login, callback SUAP, refresh — sempre público) ────
        location /api/auth/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://auth_service;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization     $http_authorization;
        }

        # ── Django admin — EXPOSTO pelo gateway (temporário) ─────────
        # O admin usa sessão/cookie próprio (não o JWT Bearer), então NÃO
        # passa pelo auth_request — senão o login entraria em deadlock.
        # Cada admin é servido pelo seu próprio serviço, e os estáticos do
        # admin vão sob /api/<service>/static/ (STATIC_URL namespeado no
        # settings de cada serviço).
        # Produção (DEBUG=False) ainda exige collectstatic + WhiteNoise
        # para o CSS do admin; em dev (runserver/DEBUG=True) já funciona.
        location /api/auth/admin/  { proxy_pass http://auth_service;        proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
        location /api/auth/static/ { proxy_pass http://auth_service;        proxy_set_header Host $host; }

        location /api/track/admin/  { proxy_pass http://tracks_service;      proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
        location /api/track/static/ { proxy_pass http://tracks_service;      proxy_set_header Host $host; }

        location /api/scholarship/admin/  { proxy_pass http://scholarship_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
        location /api/scholarship/static/ { proxy_pass http://scholarship_service; proxy_set_header Host $host; }

        # ── Trilhas ──────────────────────────────────────────────
        location /api/track/ {
            auth_request /_auth_validate;
            auth_request_set $user_id   $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            proxy_set_header X-User-Id   $user_id;
            proxy_set_header X-User-Role $user_role;

            limit_req zone=api burst=20 nodelay;
            proxy_pass http://tracks_service;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization     $http_authorization;
        }

        # ── Scholarship (bolsas + talentos) ──────────────────────
        location /api/scholarship/ {
            auth_request /_auth_validate;
            auth_request_set $user_id   $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            proxy_set_header X-User-Id   $user_id;
            proxy_set_header X-User-Role $user_role;

            limit_req zone=api burst=20 nodelay;
            proxy_pass http://scholarship_service;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization     $http_authorization;
        }

        # ── IA ───────────────────────────────────────────────────
        location /api/ai/ {
            auth_request /_auth_validate;
            auth_request_set $user_id   $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            proxy_set_header X-User-Id   $user_id;
            proxy_set_header X-User-Role $user_role;

            limit_req zone=api burst=5 nodelay;
            proxy_pass http://ai_service;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization     $http_authorization;

            # Análise de IA pode demorar — afrouxa timeouts
            proxy_read_timeout    600s;
            proxy_connect_timeout 60s;
        }

        # ── Frontend (SPA estática servida pelo container frontend) ──
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host      $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Resposta de não-autorizado (usada pelo auth_request) ─────
        error_page 401 = @unauthorized;
        location @unauthorized {
            default_type application/json;
            return 401 "{\"detail\":\"Token invalido ou ausente.\"}";
        }
    }
}

