events {
    worker_connections 1024;
}

http {

    # ── Rate limiting ────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

    # ── Upstream services ────────────────────────────────────────
    upstream auth_service    { server auth-service:8000; }
    upstream tracks_service  { server tracks-service:8001; }
    upstream scholarship_service { server scholarship-service:8002; }
    upstream ia_service      { server ia-service:8003; }

    # ── Validação interna de token (auth_request) ────────────────
    server {
        listen 80;
        server_name _;

        # Endpoint interno de validação — não exposto diretamente
        location = /internal/auth/validate/ {
            internal;
            proxy_pass http://auth_service/internal/validate/;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
        }

        # ── Auth service (login, OAuth callback — sem auth_request) ──
        location /api/auth/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Trilhas ──────────────────────────────────────────────
        location /api/tracks/ {
            auth_request /internal/auth/validate/;
            auth_request_set $user_id   $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            proxy_set_header X-User-Id   $user_id;
            proxy_set_header X-User-Role $user_role;

            limit_req zone=api burst=20 nodelay;
            proxy_pass http://tracks_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Bolsas ───────────────────────────────────────────────
        location /api/bolsas/ {
            auth_request /internal/auth/validate/;
            auth_request_set $user_id   $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            proxy_set_header X-User-Id   $user_id;
            proxy_set_header X-User-Role $user_role;

            limit_req zone=api burst=20 nodelay;
            proxy_pass http://scholarship_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── IA ───────────────────────────────────────────────────
        location /api/ia/ {
            auth_request /internal/auth/validate/;
            auth_request_set $user_id   $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            proxy_set_header X-User-Id   $user_id;
            proxy_set_header X-User-Role $user_role;

            limit_req zone=api burst=5 nodelay;
            proxy_pass http://ia_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Frontend (fallback SPA) ──────────────────────────────
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }

        # Erros de autenticação
        error_page 401 = @unauthorized;
        location @unauthorized {
            return 401 '{"detail":"Token inválido ou ausente."}';
        }
    }
}

