events {
    worker_connections 1024;
}

http {

    # ── Rate limiting ────────────────────────────────────────────
    # A SPA dispara várias chamadas por página (perfil/feed/bolsas carregam 5-10
    # endpoints). 30r/m (o valor antigo) estourava a zona em poucas navegações e
    # devolvia 503 em ações normais (ex.: POST /debug/set-role/). 300r/m (5/s),
    # somado aos burst por rota, dá folga sem abrir mão da proteção.
    limit_req_zone $binary_remote_addr zone=api:10m rate=300r/m;
    # A busca global do cabeçalho é "search-as-you-type": cada termo dispara 3
    # chamadas em paralelo (uma por serviço). Zona própria, sem dividir cota com
    # o resto da API — as rotas */search/ usam esta.
    limit_req_zone $binary_remote_addr zone=search:10m rate=300r/m;

    server {
        listen 80;
        server_name _;

        # ── Resolução DINÂMICA de upstream (padrão resiliente) ───────
        # Em vez de blocos `upstream { server nome; }` (que o nginx resolve UMA
        # vez, no load da config, e ficam presos ao IP antigo), cada rota usa
        # uma variável no proxy_pass. Assim o nginx re-resolve o nome do
        # container via DNS interno do Docker (127.0.0.11) em runtime, com
        # cache de `valid=10s`. Efeitos:
        #   - um serviço fora → só a rota dele responde 502; o gateway segue up;
        #   - o serviço volta (mesmo com IP NOVO) → recupera sozinho em ~10s,
        #     SEM precisar recarregar/reiniciar o nginx;
        #   - um serviço ausente no boot NÃO impede o nginx de subir (a
        #     resolução é adiada para a 1ª request daquela rota).
        # ipv6=off evita lookups AAAA desnecessários no DNS do Docker.
        resolver 127.0.0.11 valid=10s ipv6=off;
        resolver_timeout 5s;

        # Tamanho máximo de corpo de request. Definido no nível do server para
        # valer também na subrequisição do auth_request (/_auth_validate): se
        # ficasse só na location do feed, o auth_request veria o corpo grande
        # com o default (1m), responderia 413 e o Nginx devolveria 500. O feed
        # aceita upload de imagem (composer limita a 5 MB); folga p/ o multipart.
        client_max_body_size 10m;

        # ==========================================================
        # AUTENTICAÇÃO
        # ----------------------------------------------------------
        # Duas camadas, ambas 100% HTTP (não há mais gRPC):
        #
        #  1) BORDA — o [auth_request] abaixo chama o auth-service em
        #     /api/auth/internal/validate/ (HTTP) para rejeitar requests
        #     sem token/ inválidos antes de chegarem ao serviço, e injeta
        #     os headers X-User-Id / X-User-Role a partir do resultado.
        #
        #  2) SERVIÇO — track e scholarship revalidam o JWT localmente
        #     pelo header Authorization (mesma SIGNING_KEY, sem chamar o
        #     auth), populando request.user. O serviço ai (FastAPI) não
        #     valida por conta própria, então depende da barreira (1).
        #
        # Por isso o Nginx sempre repassa o header Authorization adiante.
        # ==========================================================
        location = /_auth_validate {
            internal;
            # Path FIXO no proxy_pass (a validação sempre bate no mesmo endpoint
            # do auth); a variável só torna a resolução do host dinâmica.
            set $auth_upstream auth-service:8000;
            proxy_pass              http://$auth_upstream/api/auth/internal/validate/;
            proxy_pass_request_body off;
            proxy_set_header        Content-Length "";
            proxy_set_header        Host $host;
            proxy_set_header        X-Original-URI $request_uri;
            proxy_set_header        Authorization $http_authorization;
        }

        # ── Busca de perfis (search-as-you-type) — zona folgada ──────
        # Prefixo mais longo que /api/auth/, então vence para esta rota. Espelha
        # o /api/auth/ (sem auth_request: o auth-service valida o próprio JWT).
        location /api/auth/users/search/ {
            limit_req zone=search burst=30 nodelay;
            set $auth_upstream auth-service:8000;
            proxy_pass http://$auth_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization     $http_authorization;
        }

        # ── Auth (login, callback SUAP, refresh — sempre público) ────
        location /api/auth/ {
            limit_req zone=api burst=10 nodelay;
            set $auth_upstream auth-service:8000;
            proxy_pass http://$auth_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization     $http_authorization;
        }

        # ── Django admin — EXPOSTO pelo gateway (temporário) ─────────
        # O admin usa sessão/cookie próprio (não o JWT Bearer), então NÃO
        # passa pelo auth_request — senão o login entraria em deadlock.
        # Cada admin é servido pelo seu próprio serviço, e os estáticos do
        # admin vão sob /api/<service>/static/ (STATIC_URL namespeado no
        # settings de cada serviço).
        # Produção (DEBUG=False) ainda exige collectstatic + WhiteNoise
        # para o CSS do admin; em dev (runserver/DEBUG=True) já funciona.
        location /api/auth/admin/  { set $auth_upstream auth-service:8000;                proxy_pass http://$auth_upstream;         proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
        location /api/auth/static/ { set $auth_upstream auth-service:8000;                proxy_pass http://$auth_upstream;         proxy_set_header Host $host; }

        location /api/track/admin/  { set $tracks_upstream tracks-service:8000;           proxy_pass http://$tracks_upstream;       proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
        location /api/track/static/ { set $tracks_upstream tracks-service:8000;           proxy_pass http://$tracks_upstream;       proxy_set_header Host $host; }

        location /api/scholarship/admin/  { set $scholarship_upstream scholarship-service:8000; proxy_pass http://$scholarship_upstream;  proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
        location /api/scholarship/static/ { set $scholarship_upstream scholarship-service:8000; proxy_pass http://$scholarship_upstream;  proxy_set_header Host $host; }

        location /api/notifications/admin/  { set $notification_upstream notification-service:8000; proxy_pass http://$notification_upstream; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
        location /api/notifications/static/ { set $notification_upstream notification-service:8000; proxy_pass http://$notification_upstream; proxy_set_header Host $host; }

        location /api/feed/admin/  { set $feed_upstream feed-service:8000;                proxy_pass http://$feed_upstream;         proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
        location /api/feed/static/ { set $feed_upstream feed-service:8000;                proxy_pass http://$feed_upstream;         proxy_set_header Host $host; }

        # ── Swagger / OpenAPI — documentação pública (sem JWT) ───────
        # /docs/ (Swagger UI) e /schema/ (OpenAPI) são apenas documentação e
        # NÃO passam pelo auth_request — assim abrem direto no navegador (o JWT
        # em localStorage não viaja numa navegação pela barra de endereço). A
        # API em si continua protegida: o match por prefixo MAIS LONGO faz estes
        # vencerem o /api/<svc>/ correspondente. Exposição: só o schema/UI.
        location /api/auth/docs/            { set $auth_upstream auth-service:8000;                 proxy_pass http://$auth_upstream;         proxy_set_header Host $host; }
        location /api/auth/schema/          { set $auth_upstream auth-service:8000;                 proxy_pass http://$auth_upstream;         proxy_set_header Host $host; }
        location /api/track/docs/           { set $tracks_upstream tracks-service:8000;            proxy_pass http://$tracks_upstream;       proxy_set_header Host $host; }
        location /api/track/schema/         { set $tracks_upstream tracks-service:8000;            proxy_pass http://$tracks_upstream;       proxy_set_header Host $host; }
        location /api/scholarship/docs/     { set $scholarship_upstream scholarship-service:8000;  proxy_pass http://$scholarship_upstream;  proxy_set_header Host $host; }
        location /api/scholarship/schema/   { set $scholarship_upstream scholarship-service:8000;  proxy_pass http://$scholarship_upstream;  proxy_set_header Host $host; }
        location /api/notifications/docs/   { set $notification_upstream notification-service:8000; proxy_pass http://$notification_upstream; proxy_set_header Host $host; }
        location /api/notifications/schema/ { set $notification_upstream notification-service:8000; proxy_pass http://$notification_upstream; proxy_set_header Host $host; }
        location /api/feed/docs/            { set $feed_upstream feed-service:8000;                 proxy_pass http://$feed_upstream;         proxy_set_header Host $host; }
        location /api/feed/schema/          { set $feed_upstream feed-service:8000;                 proxy_pass http://$feed_upstream;         proxy_set_header Host $host; }

        # ── Busca de trilhas (search-as-you-type) — zona folgada ─────
        location /api/track/tracks/search/ {
            auth_request /_auth_validate;
            auth_request_set $user_id   $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            proxy_set_header X-User-Id   $user_id;
            proxy_set_header X-User-Role $user_role;

            limit_req zone=search burst=30 nodelay;
            set $tracks_upstream tracks-service:8000;
            proxy_pass http://$tracks_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization     $http_authorization;
        }

        # ── Trilhas ──────────────────────────────────────────────
        location /api/track/ {
            auth_request /_auth_validate;
            auth_request_set $user_id   $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            proxy_set_header X-User-Id   $user_id;
            proxy_set_header X-User-Role $user_role;

            limit_req zone=api burst=20 nodelay;
            set $tracks_upstream tracks-service:8000;
            proxy_pass http://$tracks_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization     $http_authorization;
        }

        # ── Busca de bolsas (search-as-you-type) — zona folgada ──────
        location /api/scholarship/scholarships/search/ {
            auth_request /_auth_validate;
            auth_request_set $user_id   $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            proxy_set_header X-User-Id   $user_id;
            proxy_set_header X-User-Role $user_role;

            limit_req zone=search burst=30 nodelay;
            set $scholarship_upstream scholarship-service:8000;
            proxy_pass http://$scholarship_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization     $http_authorization;
        }

        # ── Scholarship (bolsas + talentos) ──────────────────────
        location /api/scholarship/ {
            auth_request /_auth_validate;
            auth_request_set $user_id   $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            proxy_set_header X-User-Id   $user_id;
            proxy_set_header X-User-Role $user_role;

            limit_req zone=api burst=20 nodelay;
            set $scholarship_upstream scholarship-service:8000;
            proxy_pass http://$scholarship_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization     $http_authorization;
        }

        # ── Notificações ─────────────────────────────────────────
        # Rotas públicas exigem JWT (barreira auth_request). A rota interna
        # /api/notifications/internal/ é chamada serviço-a-serviço pela rede
        # Docker (fora do gateway) e exige o header X-Internal-Token; se
        # alcançada por aqui, ainda passa pela barreira de JWT + token interno.
        location /api/notifications/ {
            auth_request /_auth_validate;
            auth_request_set $user_id   $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            proxy_set_header X-User-Id   $user_id;
            proxy_set_header X-User-Role $user_role;

            limit_req zone=api burst=20 nodelay;
            set $notification_upstream notification-service:8000;
            proxy_pass http://$notification_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization     $http_authorization;
        }

        # ── Feed (postagens + interações) ────────────────────────
        location /api/feed/ {
            auth_request /_auth_validate;
            auth_request_set $user_id   $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            proxy_set_header X-User-Id   $user_id;
            proxy_set_header X-User-Role $user_role;

            limit_req zone=api burst=20 nodelay;
            set $feed_upstream feed-service:8000;
            proxy_pass http://$feed_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization     $http_authorization;
        }

        # ── IA ───────────────────────────────────────────────────
        location /api/ai/ {
            auth_request /_auth_validate;
            auth_request_set $user_id   $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            proxy_set_header X-User-Id   $user_id;
            proxy_set_header X-User-Role $user_role;

            limit_req zone=api burst=5 nodelay;
            set $ai_upstream ai-service:8003;
            proxy_pass http://$ai_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization     $http_authorization;

            # Análise de IA pode demorar — afrouxa timeouts
            proxy_read_timeout    600s;
            proxy_connect_timeout 60s;
        }

        # ── Grafana (observabilidade) ────────────────────────────
        # O Grafana roda no stack SEPARADO `atlas-observability`, na mesma rede
        # `atlas-network`. Servido sob /grafana/ (GF_SERVER_SERVE_FROM_SUB_PATH
        # no compose de lá faz o Grafana prefixar assets/links com /grafana/).
        # Resolução dinâmica: se o stack de observabilidade estiver fora, só
        # esta rota responde 502 — o gateway segue up.
        location /grafana/ {
            set $grafana_upstream atlas-grafana:3000;
            proxy_pass http://$grafana_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Grafana Live usa WebSocket
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ── Frontend (SPA estática servida pelo container frontend) ──
        location / {
            set $frontend_upstream frontend:80;
            proxy_pass http://$frontend_upstream;
            proxy_set_header Host      $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Resposta de não-autorizado (usada pelo auth_request) ─────
        error_page 401 = @unauthorized;
        location @unauthorized {
            default_type application/json;
            return 401 "{\"detail\":\"Token invalido ou ausente.\"}";
        }
    }
}
