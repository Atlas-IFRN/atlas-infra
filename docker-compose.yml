services:

  # ─── Gateway ────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: atlas-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - auth-service
      - tracks-service
      - scholarship-service
      - ia-service
    networks:
      - atlas-network
    restart: unless-stopped

  # ─── Serviços ───────────────────────────────────────────────
  auth-service:
    image: ghcr.io/atlas-ifrn/atlas-auth-service:latest
    container_name: auth-service
    env_file: .env
    environment:
      - DB_SCHEMA=auth
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - atlas-network
    restart: unless-stopped

  tracks-service:
    image: ghcr.io/atlas-ifrn/atlas-track-service:latest
    container_name: tracks-service
    env_file: .env
    environment:
      - DB_SCHEMA=tracks
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - atlas-network
    restart: unless-stopped

  scholarship-service:
    image: ghcr.io/atlas-ifrn/atlas-scholarship-service:latest
    container_name: scholarship-service
    env_file: .env
    environment:
      - DB_SCHEMA=scholarship
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - atlas-network
    restart: unless-stopped

  ia-service:
    image: ghcr.io/atlas-ifrn/atlas-ai-service:latest
    container_name: ia-service
    env_file: .env
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - atlas-network
    restart: unless-stopped

  # ─── Workers Celery ─────────────────────────────────────────
  celery-worker-tracks:
    image: ghcr.io/atlas-ifrn/atlas-track-service:latest
    container_name: celery-worker-tracks
    command: celery -A config worker -l info -Q tracks --concurrency=2
    env_file: .env
    environment:
      - DB_SCHEMA=tracks
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - atlas-network
    restart: unless-stopped

  celery-worker-scholarship:
    image: ghcr.io/atlas-ifrn/atlas-scholarship-service:latest
    container_name: celery-worker-scholarship
    command: celery -A config worker -l info -Q scholarship --concurrency=2
    env_file: .env
    environment:
      - DB_SCHEMA=scholarship
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - atlas-network
    restart: unless-stopped

  # ─── Infraestrutura ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: atlas-postgres
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - atlas-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: atlas-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - atlas-network
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: atlas-rabbitmq
    env_file: .env
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - atlas-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  atlas-network:
    name: atlas-network

