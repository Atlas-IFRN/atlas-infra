services:

  # ─── Gateway (único exposto ao mundo) ───────────────────────
  nginx:
    image: nginx:alpine
    container_name: atlas-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - auth-service
      - tracks-service
      - scholarship-service
      - notification-service
      - feed-service
      - ai-service
      - frontend
    networks: [atlas-network]
    restart: unless-stopped

  # ─── Serviços (buildados do código-fonte local) ─────────────
  # Layout do servidor:
  #   services/auth  services/track  services/scholarship  services/ai
  #   frontend
  # Todos os serviços Django escutam internamente na porta 8000.

  auth-service:
    build: ./services/auth
    container_name: auth-service
    env_file: .env
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - PGOPTIONS=-c search_path=auth,public
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    networks: [atlas-network]
    restart: unless-stopped

  notification-service:
    build: ./services/notification
    container_name: notification-service
    env_file: .env
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - PGOPTIONS=-c search_path=notification,public
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    networks: [atlas-network]
    restart: unless-stopped

  feed-service:
    build: ./services/feed
    container_name: feed-service
    env_file: .env
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - PGOPTIONS=-c search_path=feed,public
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    networks: [atlas-network]
    restart: unless-stopped

  tracks-service:
    build: ./services/track
    container_name: tracks-service
    env_file: .env
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - PGOPTIONS=-c search_path=tracks,public
    depends_on:
      postgres:  { condition: service_healthy }
      redis:     { condition: service_healthy }
      rabbitmq:  { condition: service_healthy }
    networks: [atlas-network]
    restart: unless-stopped

  scholarship-service:
    build: ./services/scholarship
    container_name: scholarship-service
    env_file: .env
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - PGOPTIONS=-c search_path=scholarship,public
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    networks: [atlas-network]
    restart: unless-stopped

  ai-service:
    build: ./services/ai
    container_name: ai-service
    env_file: .env
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5-coder:1.5b}
    depends_on:
      ollama: { condition: service_started }
    networks: [atlas-network]
    restart: unless-stopped

  # ─── Workers Celery (tracks e notification) ─────────────────
  # Cada worker escuta apenas a SUA fila nomeada (-Q). Como o RabbitMQ é
  # compartilhado, isso impede que um worker consuma mensagem de outro serviço
  # (cuja task ele nem conhece). Nenhum worker usa a fila `default`.
  celery-worker-tracks:
    build: ./services/track
    container_name: celery-worker-tracks
    command: celery -A config worker -l info -Q tracks --concurrency=2
    env_file: .env
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - PGOPTIONS=-c search_path=tracks,public
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    networks: [atlas-network]
    restart: unless-stopped

  # Consome a fila `notifications` e persiste as notificações publicadas
  # pelos serviços produtores (auth, scholarship...).
  celery-worker-notifications:
    build: ./services/notification
    container_name: celery-worker-notifications
    command: celery -A config worker -l info -Q notifications --concurrency=2
    env_file: .env
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - PGOPTIONS=-c search_path=notification,public
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    networks: [atlas-network]
    restart: unless-stopped

  # ─── Frontend (build estático servido por Nginx na :80) ─────
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
        VITE_ENV_NAME: production
    container_name: frontend
    networks: [atlas-network]
    restart: unless-stopped

  # ─── LLM local (Ollama) ─────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: atlas-ollama
    volumes:
      - ollama_data:/root/.ollama
    networks: [atlas-network]
    restart: unless-stopped
    # GPU: se o VPS tiver NVIDIA + nvidia-container-toolkit, descomente:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # Baixa o modelo uma vez no startup (o ai-service espera ele existir)
  ollama-pull:
    image: ollama/ollama:latest
    container_name: atlas-ollama-pull
    depends_on:
      ollama: { condition: service_started }
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until ollama list >/dev/null 2>&1; do echo "aguardando ollama..."; sleep 2; done
        ollama pull ${OLLAMA_MODEL:-qwen2.5-coder:1.5b}
    networks: [atlas-network]
    restart: "no"

  # ─── Infraestrutura ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: atlas-postgres
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - pg_stat_statements.track=all
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [atlas-network]
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: atlas-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [atlas-network]
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: atlas-rabbitmq
    env_file: .env
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [atlas-network]
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  ollama_data:

networks:
  atlas-network:
    name: atlas-network
