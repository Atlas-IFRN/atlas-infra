name: Deploy infra (full stack) to production

# Mudanças de infraestrutura (compose, nginx, init.sql, scripts) afetam
# tudo, então este workflow faz um deploy COMPLETO: força a branch main
# em todos os repositórios do servidor e rebuilda toda a stack.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: "Rebuild sem cache (--no-cache)"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH full deploy → 144.126.151.140
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script_stop: true
          command_timeout: 35m
          script: |
            set -e
            PROJECT_DIR="/home/production"
            cd "$PROJECT_DIR"

            echo ""
            echo "╔══════════════════════════════════════╗"
            echo "║   Atlas — Deploy COMPLETO (infra)    ║"
            echo "╚══════════════════════════════════════╝"
            echo "→ $(hostname) · $(date '+%Y-%m-%d %H:%M:%S')"
            echo ""

            # Produção roda main: força o checkout dela em todos os repos.
            echo "[ 1/4 ] Forçando branch main em todos os repositórios..."
            REPOS=( "." "frontend" "services/auth" "services/track" "services/scholarship" "services/ai" )
            for dir in "${REPOS[@]}"; do
              path="$PROJECT_DIR/$dir"
              if [ -d "$path/.git" ]; then
                echo "  ↳ $dir"
                git -C "$path" fetch origin main 2>&1 | sed 's/^/      /'
                git -C "$path" checkout -B main origin/main 2>&1 | sed 's/^/      /'
              fi
            done

            chmod +x scripts/*.sh 2>/dev/null || true

            echo ""
            echo "[ 2/4 ] Buildando imagens..."
            BUILD_FLAGS=""
            if [ "${{ github.event.inputs.force_rebuild }}" = "true" ]; then
              BUILD_FLAGS="--no-cache"
            fi
            # Builda serviço a serviço para que o erro aponte QUAL falhou.
            BUILD_FALHOU=""
            for svc in postgres redis rabbitmq ollama auth-service tracks-service scholarship-service ai-service celery-worker-tracks frontend; do
              echo "----- build: $svc -----"
              if ! docker compose build $BUILD_FLAGS "$svc"; then
                echo "!!!!! FALHA no build de: $svc !!!!!"
                BUILD_FALHOU="$svc"
                break
              fi
            done
            if [ -n "$BUILD_FALHOU" ]; then
              echo ""
              echo "########################################################"
              echo "# BUILD ABORTADO. Serviço que quebrou: $BUILD_FALHOU"
              echo "# Rode no servidor para ver o erro completo:"
              echo "#   cd /home/production && docker compose build $BUILD_FALHOU"
              echo "########################################################"
              exit 1
            fi

            echo ""
            echo "[ 3/4 ] Subindo containers..."
            docker compose up -d --remove-orphans

            echo ""
            echo "[ 4/4 ] Limpando imagens antigas..."
            docker image prune -f

            echo ""
            echo "── Status ──────────────────────────────"
            docker compose ps
            echo ""
            echo "✓ Deploy completo em $(date '+%Y-%m-%d %H:%M:%S')"

