name: Deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: "Forçar rebuild de todas as imagens"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH deploy → 144.126.151.140
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script_stop: true
          command_timeout: 35m
          script: |
            set -e
            PROJECT_DIR="/home/development"
            cd "$PROJECT_DIR"

            echo ""
            echo "╔══════════════════════════════════════╗"
            echo "║        Atlas — Deploy iniciado       ║"
            echo "╚══════════════════════════════════════╝"
            echo "→ Servidor : $(hostname)"
            echo "→ Data/hora: $(date '+%Y-%m-%d %H:%M:%S')"
            echo ""

            # ── 1. Atualiza código-fonte de cada repositório ──────────
            echo "[ 1/4 ] Atualizando repositórios..."
            REPOS=(
              "."
              "frontend"
              "services/auth"
              "services/track"
              "services/scholarship"
              "services/ai"
            )
            for dir in "${REPOS[@]}"; do
              path="$PROJECT_DIR/$dir"
              if [ -d "$path/.git" ]; then
                branch=$(git -C "$path" rev-parse --abbrev-ref HEAD)
                echo "  ↳ $dir  (branch: $branch)"
                git -C "$path" pull --ff-only 2>&1 | sed 's/^/      /'
              fi
            done

            # ── 2. Permissão dos scripts ──────────────────────────────
            chmod +x scripts/*.sh 2>/dev/null || true

            # ── 3. Build e restart dos containers ────────────────────
            echo ""
            echo "[ 2/4 ] Buildando imagens..."
            if [ "${{ github.event.inputs.force_rebuild }}" = "true" ]; then
              echo "  (modo force rebuild — sem cache)"
              docker compose build --no-cache
            else
              docker compose build
            fi

            echo ""
            echo "[ 3/4 ] Subindo containers..."
            docker compose up -d --remove-orphans

            echo ""
            echo "[ 4/4 ] Limpando imagens antigas..."
            docker image prune -f

            # ── Status final ─────────────────────────────────────────
            echo ""
            echo "╔══════════════════════════════════════╗"
            echo "║           Status dos containers      ║"
            echo "╚══════════════════════════════════════╝"
            docker compose ps

            echo ""
            echo "✓ Deploy concluído em $(date '+%Y-%m-%d %H:%M:%S')"
